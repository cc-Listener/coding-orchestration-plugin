    - name: run_context_artifact_service
      path: coding_orchestration/run_context_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 wiki context、confirmed plan / implementation context、assembled context、run instructions、execution policy、context index 文件写入或 execution-policy.json 读取逻辑。"
    - name: run_start_artifact_service
      path: coding_orchestration/run_start_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 report.schema.json、input-prompt.md 或 run-manifest.json 启动 artifact 文件写入逻辑。"
    - name: run_manifest_artifact_service
      path: coding_orchestration/run_manifest_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 run-manifest.json artifact 写回逻辑。"
