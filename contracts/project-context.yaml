version: 1
bootstrap_status:
  level: bootstrap_complete
  mode: bootstrap
  depth_scope: repo
  app_targets: []
  placement_strategy: root-docs
  trigger_evidence:
    - "仓库缺少 AGENTS.md。"
    - "仓库缺少 docs/project-map.md、docs/conventions.md、docs/component-contract.md。"
    - "仓库缺少 contracts/project-context.yaml。"
    - "未发现 apps/* 或独立主应用子域，因此未触发 app-deep refresh。"

navigation_layer:
  agents_md:
    path: AGENTS.md
    role: repository_navigation
  effective_guidance_entry:
    path: AGENTS.md
    role: active_guidance_entrypoint
  effective_guidance_kind: agents_md
  canonical_sources:
    human_readable:
      - docs/project-map.md
      - docs/conventions.md
      - docs/component-contract.md
    machine_readable:
      - contracts/project-context.yaml
  agent_index: null

project_map:
  repo_type: python_hermes_plugin
  workspace_mode: single_package
  runtime_model:
    plugin_symlink: "~/.hermes/plugins/coding_orchestration -> coding_orchestration"
    runtime_root: "~/.hermes/coding-orchestration"
    gateway: Hermes Gateway
  top_level_modules:
    - name: coding_orchestration
      path: coding_orchestration/
      role: Hermes plugin source, orchestration logic, runners, source adapters, ledger, dashboard API
    - name: tests
      path: tests/
      role: unittest coverage for orchestration, runners, source resolution, install scripts, dashboard, state machine; legacy flow cleanup and scanner/boundary drift coverage are locked by tests/test_architecture_guard.py, module-family package layout is locked by tests/test_architecture_module_layout.py, architecture guard test growth buffer is locked by tests/test_architecture_guard_test_governance.py, with tests/test_orchestrator_run_flow.py limited to smoke/transition/sandbox and old private-helper coverage moved to service/policy/presenter/adapter contracts
    - name: scripts
      path: scripts/
      role: user-facing install, uninstall, architecture guard, and release readiness entry scripts; scripts/release_readiness.py runs full unittest, architecture guard, git diff --check, sensitive scan, and minimal Hermes smoke
    - name: examples
      path: examples/
      role: project registry and WORKFLOW examples
    - name: docs
      path: docs/
      role: canonical bootstrap docs, project documentation, deployment/preflight docs, state/delivery flow docs
    - name: implementation_plans
      path: docs/plans/
      role: committed implementation plans produced by superpowers or execution planning workflows
    - name: local_presentations
      path: docs/local/presentations/
      role: ignored local presentation/demo materials; not canonical project facts
  core_entrypoints:
    plugin_registration: coding_orchestration/__init__.py
    orchestrator: coding_orchestration/orchestrator.py
    cli_registration: coding_orchestration/cli.py
    tool_registration: coding_orchestration/plugin_tools.py
    tool_operation_dispatcher: coding_orchestration/tools/tool_operation_dispatcher.py
    plugin_manifest: coding_orchestration/plugin.yaml
    install_script: scripts/install_symlink.py
    uninstall_script: scripts/uninstall_legacy.py
  guarded_paths:
    - path: ".env*"
      reason: "本地密钥、token 或运行配置。"
    - path: "~/.hermes/.env"
      reason: "Hermes FEISHU_APP_ID、FEISHU_APP_SECRET、CODEX_CLI_COMMAND 等本机配置。"
    - path: "~/.hermes/auth.json"
      reason: "Hermes provider/OAuth 凭据，不得复制。"
    - path: "~/.codex/auth.json"
      reason: "standalone Codex CLI 凭据，不得复制到 Hermes。"
    - path: "~/.hermes/coding-orchestration/"
      reason: "运行期 ledger、runs、workspaces、LLM Wiki，不是源码事实。"
    - path: coding_orchestration/orchestrator.py
      reason: "任务状态推进、人工门禁和 runner 调度中心。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_bootstrap_facade.py
      reason: "Orchestrator bootstrap façade mixin，维护 __post_init__、set_dispatch_tool、from_default_config 和默认运行根 helper；CodingOrchestrator 只继承 mixin 保留兼容入口，不承载 handle_gateway_event、pre_llm_call、start_run、runner dispatch、workspace/git/checkpoint 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_command_facade.py
      reason: "Orchestrator command façade mixin，维护普通 /coding ... command façade 分发表、command-level wrapper、delivery rollup/materialize helper、artifact purge callback 和 prepare-merge-test status callback；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 Gateway route、tool operation dispatcher、task/source façade、runner/workspace/git、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_gateway_facade.py
      reason: "Orchestrator Gateway façade mixin，维护 Gateway immediate/custom route dispatch、Coding Mode rewrite wrapper、pending action/rewrite binding wrapper、确认/取消词 wrapper、commands listing route、dedupe/授权/looks-like-task wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 handle_gateway_event 入口、task/source façade、active task/project binding 业务、runner/workspace/git、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_project_facade.py
      reason: "Orchestrator project façade mixin，维护 project profile catalog wrapper、active project binding wrapper、本地项目候选/路径/别名 wrapper、active project 回填 wrapper、人工项目画像 upsert 和项目澄清 host callback；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 task/source façade、Gateway route、active task/coding mode binding、runner/workspace/git、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_task_source_facade.py
      reason: "Orchestrator task/source façade mixin，维护 task create command wrapper、TaskService source/status payload wrapper、source context 读取/修复/enrich wrapper、event/media ledger helper 和 draft knowledge source refs wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 active task/coding mode binding、feedback command host shell、runner/workspace/git、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_task_runtime_facade.py
      reason: "Orchestrator task runtime façade mixin，维护 Kanban/status host wrapper、task list/status event wrapper、feedback active-task wrapper、active task/coding mode binding wrapper、task lifecycle wrapper、人工决策记录和 RunService gate wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 handle_gateway_event、active run reconcile、runner/workspace/git、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_workspace_facade.py
      reason: "Orchestrator workspace façade mixin，维护 implementation/merge-test workspace 查找、QA artifact 收集、QA/merge-test checkpoint 准备、dirty/head/clean checkpoint 观测、source branch/base branch 投影、task short id/slug 和 latest existing implementation workspace wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 workspace/git/checkpoint 核心实现、handle_gateway_event、active run reconcile、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_background_facade.py
      reason: "Orchestrator background façade mixin，维护后台 plan/implementation/QA/merge-test 启动与通知 wrapper、completion wait/failed/pending-action/notification wrapper、sender scheduling/reply wrapper 和 execution policy artifact wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载后台 executor/notifier/orchestration 核心实现、handle_gateway_event、active run reconcile、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_status_policy_facade.py
      reason: "Orchestrator status policy façade mixin，维护 report status details、implementation status normalize、verification limitations 补齐和 run result 到 task status/phase 映射 wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 status_policy.py 纯规则、状态机、handle_gateway_event、active run reconcile、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_manifest_facade.py
      reason: "Orchestrator manifest façade mixin，维护 existing/fresh artifact set、run manifest 构造、Codex attach/resume 命令、session id 读取、runner manifest name 和 manifest session metadata 写回 wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 manifest 纯规则、artifact service、handle_gateway_event、active run reconcile、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_prompt_context_facade.py
      reason: "Orchestrator prompt/context façade mixin，维护 resumed session 增量上下文、wiki docs/refs、context artifacts、dependency/sibling task context、confirmed plan / merge-test context、report summary markdown 和 wiki ref 投影 wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 context artifact service 纯写入、prompt projection、manifest 构造、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_merge_test_facade.py
      reason: "Orchestrator merge-test façade mixin，维护 merge-test blocker、blocked task 风险放行 host 写回、blocked assessment fact collection、latest implementation run/source branch/disallowed reason wrapper 和 QA evidence wrapper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 merge-test readiness 纯评估规则、workspace/git/checkpoint 实现、runner 调度、start_run 或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_runtime_facade.py
      reason: "Orchestrator runtime/failure façade mixin，维护 flag helper、project/workflow wrapper、plan report session/execution policy/timeout wrapper、runner failed result 和 checkpoint failed result；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 start_run 主体、runner dispatch、artifact service 纯写入、workspace/git/checkpoint 实现或 run lifecycle。"
    - path: coding_orchestration/orchestrator_facades/orchestrator_active_run_facade.py
      reason: "Orchestrator active run façade mixin，维护 completed active run reconcile host shell 和 agent run lookup helper；CodingOrchestrator 只继承 mixin 保留兼容方法名，不承载 start_run 主体、fresh completion writeback、runner dispatch、workspace/git/checkpoint 实现或 run lifecycle。"
    - path: coding_orchestration/run_orchestration_service.py
      reason: "Observed run report、stale completion 观测、execution policy decision 读取、run-level diff guard violations 组合、verification limitations fallback projection、completion report payload、agent run record、reconciled agent run record、reconcile result payload、existing run mode/changed files 规则、merge-test run record、project writeback payload、start_run result payload 和 run completion 投影 helper；兼容 re-export run report refinement、run start selection、run session 与 run prompt projection。"
    - path: coding_orchestration/run/projections/run_failure_report_projection.py
      reason: "Runner/checkpoint failure report payload projection helper，维护结构化恢复合同，不承载 artifact 写入或 RunResult 包装。"
    - path: coding_orchestration/run/projections/run_report_refinement_projection.py
      reason: "Run report refinement projection helper，维护 diff guard / implementation commit missing blocked report 和 observed report status/details refinement，不执行 diff guard、workspace dirty check、report 写入或 ledger 推进。"
    - path: coding_orchestration/services/merge_test_readiness_service.py
      reason: "Blocked merge-test readiness 纯评估 service，只消费 task/run/workspace/session/report 事实并返回风险放行评估；不写 ledger、不推进状态、不触发 runner、不发送 Gateway 回复。"
    - path: coding_orchestration/project/project_profile_catalog.py
      reason: "Project profile catalog，只读取 LLM Wiki project profile、registry project facts 和初始化质量评估，返回 profile/list/status 数据或文案；不写 profile、不绑定 active project、不发送 Gateway 回复。"
    - path: coding_orchestration/commands/project/project_command_executor.py
      reason: "Project command executor host shell，维护 /coding project list/init/use/status/clear 命令模式提示和 Gateway immediate project context 分支，调用注入的 profile upsert、active project binding、project formatter 与路径解析 callback；不拥有 Gateway route、不创建任务、不启动 runner、不推进状态、不实现 project profile catalog 纯规则。"
    - path: coding_orchestration/coding_commands/coding_help_command_executor.py
      reason: "Coding help command executor host shell，维护普通 /coding help、Gateway /commands listing、分页和 Hermes built-in command list 拼接；不拥有 command catalog 纯数据、Gateway route/controller、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/commands/command_catalog.py
      reason: "Command catalog 纯数据，维护 /coding actions、intent、risk、required args、help/listing 文案和 rewrite context；不拥有 Gateway route/controller、host shell、副作用或 run lifecycle。"
    - path: coding_orchestration/commands/command_rewriter.py
      reason: "Command rewriter adapter，维护 Coding Mode LLM rewrite prompt、JSON 解析和 fallback shape；不执行命令、不创建 task、不启动 runner、不发送 Gateway 回复。"
    - path: coding_orchestration/gateway/gateway_command_controller.py
      reason: "Gateway command controller 纯规则层，维护显式 /coding / /commands 解析、命令归一化、route metadata、handler key、reply mode、task id 来源、merge-test 参数、rewrite canonical command、确认/取消词、dedupe 和授权探测；Task 29 完成后不得承载 ledger、runner、消息发送、状态推进或 run lifecycle。"
    - path: coding_orchestration/gateway/gateway_command_executor.py
      reason: "Gateway custom route host shell，维护 task/run/delivery/implementation/QA/prepare-merge-test/merge-test route metadata 到 host action 的分发，并 direct 调用 presenters/run_start_presenter.py 与 presenters/merge_test_presenter.py 渲染对应用户可见文案；不承载 controller 纯解析规则，不拥有 runner/workspace/git/run lifecycle。"
    - path: coding_orchestration/gateway/gateway_pending_action_executor.py
      reason: "Gateway pending action host shell，维护确认/取消、latest human_required fallback、取消任务 gate 和确认后显式命令续接；不拥有 controller 纯解析规则、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/gateway/gateway_active_context.py
      reason: "Gateway active context host helper，维护 active project 回填缺项目 task 和 human decision 记录；不负责 active binding 存取、项目初始化、项目画像或 runner/workspace/git/run lifecycle。"
    - path: coding_orchestration/gateway/gateway_coding_mode_executor.py
      reason: "Gateway coding mode host shell，维护 coding mode enter/exit、pending rewrite 确认/取消、高置信度 rewrite direct execute、低置信度 handoff、rewrite context 装配、gateway_rewrite_presenter.py direct 文案调用和 presenters/task_list_presenter.py direct task label 调用；不拥有 Gateway route/controller、pending action executor、task 创建实现、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_diagnostics_command_executor.py
      reason: "Coding diagnostics command executor host shell，维护 doctor / lark-preflight / project-mcp-preflight / source-resolve command-mode dispatch、Project MCP config/stdio readiness gate、Hermes runtime availability probe、Gateway immediate diagnostic 分支和 presenters/doctor_presenter.py direct 文案调用；不拥有 Gateway route、不实现 CLI direct dispatcher、不迁普通 status/list presentation、不触碰 runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/integrations/hermes/hermes_runtime.py
      reason: "Hermes runtime integration adapter，维护 Hermes terminal background dispatch 和 dispatch start result 归一；不拥有 runner 选择、Codex command 构造、report 读取或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_task_list_command_executor.py
      reason: "Coding task list command executor host shell，维护普通 /coding list 与 Gateway list immediate 的 active status 查询、active task 标记、空列表文案和会话切换提示；不实现 task list presenter、Gateway route、CLI direct dispatcher、status reconcile、delivery/project/diagnostics、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_status_command_executor.py
      reason: "Coding status command executor host shell，维护普通 /coding status <task_id> 与 Gateway status immediate 的参数解析、active task fallback、active run reconcile callback、delivery/tree status 委托和 presenters/task_status_presenter.py direct 调用；不拥有 active run reconcile 实现、不实现 delivery status executor 或 TaskStatus presenter、不触碰 Gateway route、CLI direct dispatcher、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_run_command_executor.py
      reason: "Coding run command executor host shell，维护普通 /coding run <task_id>、/coding implement <task_id> 和 /coding qa <task_id> 的同步 command-mode task gate、human decision、QA request、start_run callback 接线和 presenters/run_completion_presenter direct call；不拥有 /coding run <parent> --next、Gateway 异步启动、start_run 实现、active run reconcile、workspace/checkpoint/git、merge-test gates、delete/cancel/restore 或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_merge_test_command_executor.py
      reason: "Coding merge-test command executor host shell，维护普通 prepare-merge-test / merge-test command 分支、blocked risk release 接线、QA 风险确认、merge-test run 启动 callback、presenters/merge_test_presenter direct call 和 presenters/run_completion_presenter direct call；不拥有 workspace/git/checkpoint 实现、blocked readiness 纯评估、QA evidence 观测、start_run 实现或 run lifecycle。"
    - path: coding_orchestration/background/coding_background_run_executor.py
      reason: "Coding background run executor host shell，维护 Gateway 后台 plan-only / implementation / QA / merge-test mode-specific 启动、presenters/run_completion_presenter direct message 选择、失败通知和 completion notification callback 接线；不拥有 start_run、后台等待完成、失败状态收敛、merge-test pending action、runner/workspace/git/checkpoint 或 run lifecycle。"
    - path: coding_orchestration/source/source_context_repair_service.py
      reason: "Source context repair host service，维护 source context 读取、deferred source pre-run enrichment、既有 task context 修复、source summary 回写和项目上下文回填接线；不改 legacy source_context schema、不实现 source reader、不承载 source 权限策略、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/source/
      reason: "Source package，维护 Feishu/Meegle URL 解析、deferred recovery payload、work item payload 归一化和 SourceProjection 稳定投影；不承载 source resolver、reader transport、ledger schema、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/source/adapters/
      reason: "Source reader adapter package，维护 Meegle/飞书 Project reader gateway/CLI fallback、payload 归一化接线和 deferred recovery 接线；不承载 source resolver、source context repair、ledger schema、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/integrations/kanban/kanban_bridge.py
      reason: "Kanban integration adapter，维护真实 Kanban 工具映射；不承载 task 创建同步、状态同步、状态机、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/integrations/kanban/kanban_sync_service.py
      reason: "Kanban sync host service，维护 task 创建时的 Kanban create 写回、状态同步写回、skipped/failed sync record 和 task status view 字段投影；不改 kanban_bridge 工具映射、不改状态机、不承载 runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/services/task_lifecycle_guard_service.py
      reason: "Task lifecycle guard service，维护 active coding status 列表、取消态保护文案、cancelled task 恢复状态选择和 merged_test bugfix reopen 写回；不改状态机、不承载 runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/coding_commands/coding_feedback_command_executor.py
      reason: "Coding feedback command executor host shell，维护普通 /coding continue/change/bugfix 命令模式占位、Gateway active task feedback 分流、feedback human decision / draft knowledge 记录 helper 和 bugfix replan 选择规则；direct 调用 presenters/feedback_presenter.py 渲染用户可见反馈文案，并通过 host callback 调用 Project clarification、后台 plan/implementation 启动和 merged-test reopen，不拥有 Gateway route/controller、后台 runner 实现、start_run、workspace/checkpoint/git、merge-test gates、source enrichment 或 Project MCP 写回。"
    - path: coding_orchestration/coding_commands/coding_task_control_command_executor.py
      reason: "Coding task control command executor host shell，维护普通 /coding use/exit/cancel/restore/delete/complete command-mode 分支和 Gateway use/exit task binding shell；delete artifact 清理通过 host callback，不拥有 Gateway route/controller、文件系统清理实现、runner/workspace/git、merge-test gates 或 run lifecycle。"
    - path: coding_orchestration/feishu/
      reason: "Feishu/Lark adapter package，维护飞书用户可见文案、Docx/Wiki reader、Project work item reader、Project reader 兼容 façade 和 Project MCP adapter；不承载通用 source projection、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/gateway/gateway_rewrite_context.py
      reason: "Gateway rewrite context 纯投影 helper，只消费已采集的 task/project/media/catalog 事实并返回 LLM rewrite context 与 next-step hint；不读 ledger、不持有 Gateway event、不调用 command_rewriter、不发送回复。"
    - path: coding_orchestration/commands/delivery/delivery_command_executor.py
      reason: "Delivery command executor host shell，维护 /coding breakdown、/coding analyze、/coding approve-breakdown、/coding materialize、/coding run <parent> --next、/coding status <parent> --delivery/--tree 用户可见分支和 decomposition / human decision / ledger / rollup callback 绑定；不承载 DeliveryService 纯规则、不实现 runner、不触碰 Gateway route 或 workspace/git 副作用。"
    - path: coding_orchestration/source/source_projection.py
      reason: "SourceProjection 纯投影层，把 SourceResult / legacy source_context 映射为 prompt/context/status/manifest/run-preflight/dashboard source health/source-resolve diagnostic payload/task creation helper 稳定字段，并提供 context-index 序列化 payload；不读外部来源、不写 ledger、不推进状态、不改变 source_context 持久化。"
    - path: coding_orchestration/run/services/run_diff_guard_service.py
      reason: "Run diff guard observation host service，维护 before snapshot、changed files 观测、QA report artifact 过滤、policy violations 组合、plan-only 写入 violations 补充和 diff summary 写回；不写 ledger/report/manifest/summary、不启动 runner、不推进状态。"
    - path: coding_orchestration/policies/
      reason: "Policy/guard helper package，维护 DiffGuard diff boundary audit 和 ExecutionPolicy 归一化；不承载 status_policy、状态机、run diff guard host service、RunService timeout、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/run/services/run_dispatch_service.py
      reason: "Run dispatch host service，维护 checkpoint failure gate、runner.run 调度和 runner exception fallback；不写 ledger/report/manifest/summary、不执行 diff guard、不收集 QA evidence、不推进状态。"
    - path: coding_orchestration/run/services/run_status_transition_service.py
      reason: "Run status transition host service，维护状态机、status/phase/Kanban callback、run start/completion/reconcile transition 和 active run cleanup；不写 report/manifest/summary、不启动 runner、不执行 diff guard、不收集 QA evidence。"
    - path: coding_orchestration/run/services/run_evidence_observation_service.py
      reason: "Run evidence observation host service，维护 QA artifacts、tested commit 和 implementation dirty-check observation；只调用注入 callback，不写 ledger/report/manifest/summary、不创建 checkpoint、不启动 runner、不推进状态。"
    - path: coding_orchestration/run/services/run_checkpoint_preparation_service.py
      reason: "Run checkpoint preparation host service，维护 QA/merge-test checkpoint callback 选择、调用和 manifest update payload；只调用注入 callback，不直接 mutate manifest、不写 artifact/ledger/report/summary、不启动 runner、不推进状态。"
    - path: coding_orchestration/run/services/run_implementation_checkpoint_service.py
      reason: "Run implementation checkpoint writeback host service，维护 implementation dirty 后置 checkpoint 生成和 manifest artifact writeback callback 接线；只消费已计算好的 dirty flag，不构造 blocked report、不写 ledger/report/summary、不启动 runner、不推进状态。"
    - path: coding_orchestration/run/services/run_manifest_session_writeback_service.py
      reason: "Run manifest session metadata writeback host service，维护 runner session metadata 到 run manifest 的 callback 接线；只消费已解析 session id，复用 manifest session 字段投影，不写 ledger/report/summary、不启动 runner、不推进状态。"
    - path: coding_orchestration/run/services/run_completion_writeback_service.py
      reason: "Completed run writeback coordinator host service，维护 fresh completed run 的 completion projection、stale observation、状态 transition、ledger/session/summary/project writeback 和 final result payload；只通过注入 callback 工作，不启动 runner、不执行 diff guard、不收集 QA evidence、不判断 dirty 或准备 checkpoint。"
    - path: coding_orchestration/run/services/run_reconcile_writeback_service.py
      reason: "Active run reconcile writeback coordinator host service，维护 active run reconcile 完成态的 completion projection、最终 report 写回、状态 transition、ledger upsert、runner session update、summary writer callback 和 result payload；只消费已归一化 report 与注入 callback，不读取 workspace、不启动 runner、不执行 diff guard、不收集 QA evidence、不判断 dirty 或准备 checkpoint。"
    - path: coding_orchestration/run/projections/run_start_selection_projection.py
      reason: "Run start selection projection helper，维护 context source、checkpoint selection、QA evidence observation、source branch recording、project path requirement、workspace selection 和 manifest checkpoint preparation selection 纯规则，不读取 workspace、不准备 checkpoint、不写 manifest 或 ledger。"
    - path: coding_orchestration/run/projections/run_session_projection.py
      reason: "Run session projection helper，维护 plan report session fields 白名单、plan report session update、run start base/workspace session update、active run session update、runner session update 和 completion session update 纯 payload，不写 ledger、不生成 attach command、不读取 artifact 或推进状态。"
    - path: coding_orchestration/run/services/run_session_writeback_service.py
      reason: "Run session writeback host service，维护 start_run 与 active run reconcile 的 task session callback 调用；只消费 session update dict 并调用注入 callback，不直接持有 TaskLedger 或 storage repository。"
    - path: coding_orchestration/run/projections/run_prompt_projection.py
      reason: "Run prompt projection helper，维护首次/增量 prompt 构造选择和参数合同，不写 input-prompt.md、不生成 context artifact、不写 manifest、不启动 runner 或推进 ledger。"
    - path: coding_orchestration/prompting/
      reason: "Prompt/context helper package，维护 PromptBuilder、ContextAssembler 和 pre-LLM active task context；只组合 prompt/context，不承载 prompts 模板 owner、artifact 文件写入、manifest 构造、runner/workspace/git 或 run lifecycle。"
    - path: coding_orchestration/run/artifacts/run_context_artifact_service.py
      reason: "Run context artifact service，维护 wiki context、confirmed plan / implementation context、assembled context、run instructions、execution policy 和 context index 写入，以及 execution-policy.json 读取，只触达 run_dir context artifact。"
    - path: coding_orchestration/run/artifacts/run_start_artifact_service.py
      reason: "Run start artifact service，维护 report.schema.json、input-prompt.md 和 run-manifest.json 启动 artifact 写入，只写 run_dir 启动 artifact。"
    - path: coding_orchestration/run/projections/run_ledger_projection.py
      reason: "Run ledger writeback projection，维护 start_run 与 active run reconcile 的 artifact / agent_run / merge-test record 写回 payload 聚合；不调用 ledger、不写 artifact 或推进状态。"
    - path: coding_orchestration/run/services/run_ledger_writeback_service.py
      reason: "Run ledger writeback host service，维护 completed run 与 active run reconcile 的 ledger callback 调用；只消费 projection records 并调用注入 callback，不直接持有 TaskLedger 或 storage repository。"
    - path: coding_orchestration/run/services/run_summary_writeback_service.py
      reason: "Run summary writeback host service，维护 completed run 与 active run reconcile 的 summary writer callback 调用；消费 summary projection 并调用注入 writer，不直接持有 Knowledge adapter。"
    - path: coding_orchestration/integrations/knowledge/run_summary_writer.py
      reason: "Run summary writer knowledge integration helper，只委托注入的 KnowledgePort.write_run_summary，不拼接 LLM Wiki 文档、不读写 artifact/ledger、不启动 runner 或推进状态。"
    - path: coding_orchestration/integrations/knowledge/knowledge_adapter.py
      reason: "KnowledgePort 本地实现，封装本地 LLM Wiki search/read/upsert/source-task lookup/delete、kind lookup 和 run summary 文档写入；不拥有 Project knowledge resolver/initializer、ledger、runner 或 run lifecycle。"
    - path: coding_orchestration/integrations/knowledge/llm_wiki_adapter.py
      reason: "本地 LLM Wiki Markdown layout adapter，维护 wiki/raw/.llm-wiki 文件布局、frontmatter 读写和 legacy index 兼容；不复制运行根内容到仓库、不推进 task/run 状态。"
    - path: coding_orchestration/run/services/run_background_orchestration.py
      reason: "后台 run 等待完成、后台启动失败状态收敛和 merge-test human_required pending action host orchestration helper。"
    - path: coding_orchestration/run/services/run_manifest_service.py
      reason: "Run manifest/session policy helper，维护 manifest 基础字段、session metadata 字段投影、attach/resume 展示命令和权限 profile。"
    - path: coding_orchestration/run/artifacts/run_artifact_paths.py
      reason: "Run artifact path projection，维护 fresh run_dir 和 existing run record 的 ArtifactSet 路径合同，不读写 artifact 文件或推进状态。"
    - path: coding_orchestration/run/services/run_project_writeback_service.py
      reason: "Run project writeback host service，维护 completed run 的 Project/WorkItem writeback stale gate、payload 委托和 callback 调用，不直接持有 MCP/WorkItem adapter。"
    - path: coding_orchestration/runners/codex_cli.py
      reason: "Codex CLI sandbox、resume、report 输出和高权限 flag。"
    - path: coding_orchestration/integrations/install/install.py
      reason: "本机 Hermes 安装、卸载和 preflight 检查逻辑；脚本只保留入口和用户输出。"
    - path: coding_orchestration/reports/report_contract.py
      reason: "结构化 runner report 质量门。"
    - path: coding_orchestration/state_machine.py
      reason: "公共任务状态转换 contract。"

conventions:
  sources:
    - path: AGENTS.md
      kind: navigation
    - path: README.md
      kind: product_and_runtime_overview
    - path: PLUGIN_USAGE.md
      kind: usage
    - path: PLUGIN_PREREQUISITES.md
      kind: preflight_and_environment
    - path: docs/conventions.md
      kind: canonical_conventions
  command_prefix: rtk
  validation_gates:
    - name: full_unittest
      command_hint: "rtk proxy python3 -m unittest discover -s tests -v"
    - name: single_unittest_file
      command_hint: "rtk proxy python3 -m unittest tests.test_install -v"
    - name: install_preflight
      command_hint: "rtk python3 scripts/install_symlink.py --hermes-home ~/.hermes"
    - name: uninstall_dry_run
      command_hint: "rtk python3 scripts/uninstall_legacy.py --hermes-home ~/.hermes"
    - name: hermes_plugin_status
      command_hint: "rtk hermes plugins list"
    - name: hermes_gateway_status
      command_hint: "rtk hermes gateway status"
  test_framework:
    type: unittest
    test_dir: tests/
    primary_command: "rtk proxy python3 -m unittest discover -s tests -v"
  release_gates:
    - "插件更新后必须重启 Hermes Gateway。"
    - "merge-test 和发布需要人工触发。"
    - "plan-only 不应修改项目文件。"

