version: 1
bootstrap_status:
  level: bootstrap_complete
  mode: bootstrap
  depth_scope: repo
  app_targets: []
  placement_strategy: root-docs
  trigger_evidence:
    - "仓库缺少 AGENTS.md。"
    - "仓库缺少 docs/project-map.md、docs/conventions.md、docs/component-contract.md。"
    - "仓库缺少 contracts/project-context.yaml。"
    - "未发现 apps/* 或独立主应用子域，因此未触发 app-deep refresh。"

navigation_layer:
  agents_md:
    path: AGENTS.md
    role: repository_navigation
  effective_guidance_entry:
    path: AGENTS.md
    role: active_guidance_entrypoint
  effective_guidance_kind: agents_md
  canonical_sources:
    human_readable:
      - docs/project-map.md
      - docs/conventions.md
      - docs/component-contract.md
    machine_readable:
      - contracts/project-context.yaml
  agent_index: null

project_map:
  repo_type: python_hermes_plugin
  workspace_mode: single_package
  runtime_model:
    plugin_symlink: "~/.hermes/plugins/coding_orchestration -> coding_orchestration"
    runtime_root: "~/.hermes/coding-orchestration"
    gateway: Hermes Gateway
  top_level_modules:
    - name: coding_orchestration
      path: coding_orchestration/
      role: Hermes plugin source, orchestration logic, runners, source adapters, ledger, dashboard API
    - name: tests
      path: tests/
      role: unittest coverage for orchestration, runners, source resolution, install scripts, dashboard, state machine
    - name: scripts
      path: scripts/
      role: user-facing install and uninstall entry scripts
    - name: examples
      path: examples/
      role: project registry and WORKFLOW examples
    - name: docs
      path: docs/
      role: canonical bootstrap docs, project documentation, deployment/preflight docs, state/delivery flow docs
    - name: implementation_plans
      path: docs/plans/
      role: committed implementation plans produced by superpowers or execution planning workflows
    - name: local_presentations
      path: docs/local/presentations/
      role: ignored local presentation/demo materials; not canonical project facts
  core_entrypoints:
    plugin_registration: coding_orchestration/__init__.py
    orchestrator: coding_orchestration/orchestrator.py
    cli_registration: coding_orchestration/cli.py
    tool_registration: coding_orchestration/plugin_tools.py
    plugin_manifest: coding_orchestration/plugin.yaml
    install_script: scripts/install_symlink.py
    uninstall_script: scripts/uninstall_legacy.py
  guarded_paths:
    - path: ".env*"
      reason: "本地密钥、token 或运行配置。"
    - path: "~/.hermes/.env"
      reason: "Hermes FEISHU_APP_ID、FEISHU_APP_SECRET、CODEX_CLI_COMMAND 等本机配置。"
    - path: "~/.hermes/auth.json"
      reason: "Hermes provider/OAuth 凭据，不得复制。"
    - path: "~/.codex/auth.json"
      reason: "standalone Codex CLI 凭据，不得复制到 Hermes。"
    - path: "~/.hermes/coding-orchestration/"
      reason: "运行期 ledger、runs、workspaces、LLM Wiki，不是源码事实。"
    - path: coding_orchestration/orchestrator.py
      reason: "任务状态推进、人工门禁和 runner 调度中心。"
    - path: coding_orchestration/run_orchestration_service.py
      reason: "Observed run report、stale completion 观测、execution policy decision 读取、run-level diff guard violations 组合、verification limitations fallback projection、completion report payload、agent run record、reconciled agent run record、reconcile result payload、existing run mode/changed files 规则、merge-test run record、project writeback payload、start_run result payload 和 run completion 投影 helper；兼容 re-export run report refinement、run start selection、run session 与 run prompt projection。"
    - path: coding_orchestration/run_failure_report_projection.py
      reason: "Runner/checkpoint failure report payload projection helper，维护结构化恢复合同，不承载 artifact 写入或 RunResult 包装。"
    - path: coding_orchestration/run_report_refinement_projection.py
      reason: "Run report refinement projection helper，维护 diff guard / implementation commit missing blocked report 和 observed report status/details refinement，不执行 diff guard、workspace dirty check、report 写入或 ledger 推进。"
    - path: coding_orchestration/run_start_selection_projection.py
      reason: "Run start selection projection helper，维护 context source、checkpoint selection、QA evidence observation、source branch recording、project path requirement、workspace selection 和 manifest checkpoint preparation selection 纯规则，不读取 workspace、不准备 checkpoint、不写 manifest 或 ledger。"
    - path: coding_orchestration/run_session_projection.py
      reason: "Run session projection helper，维护 plan report session fields 白名单、plan report session update、run start base/workspace session update、active run session update、runner session update 和 completion session update 纯 payload，不写 ledger、不生成 attach command、不读取 artifact 或推进状态。"
    - path: coding_orchestration/run_prompt_projection.py
      reason: "Run prompt projection helper，维护首次/增量 prompt 构造选择和参数合同，不写 input-prompt.md、不生成 context artifact、不写 manifest、不启动 runner 或推进 ledger。"
    - path: coding_orchestration/run_context_artifact_service.py
      reason: "Run context artifact service，维护 wiki context、confirmed plan / implementation context、assembled context、run instructions、execution policy 和 context index 写入，只写 run_dir context artifact。"
    - path: coding_orchestration/run_start_artifact_service.py
      reason: "Run start artifact service，维护 report.schema.json、input-prompt.md 和 run-manifest.json 启动 artifact 写入，只写 run_dir 启动 artifact。"
    - path: coding_orchestration/run_ledger_projection.py
      reason: "Run ledger writeback projection，维护 start_run 与 active run reconcile 的 artifact / agent_run / merge-test record 写回 payload 聚合；不调用 ledger、不写 artifact 或推进状态。"
    - path: coding_orchestration/run_background_orchestration.py
      reason: "后台 run 等待完成、后台启动失败状态收敛和 merge-test human_required pending action host orchestration helper。"
    - path: coding_orchestration/run_manifest_service.py
      reason: "Run manifest/session policy helper，维护 manifest 基础字段、session metadata 字段投影、attach/resume 展示命令和权限 profile。"
    - path: coding_orchestration/run_artifact_paths.py
      reason: "Run artifact path projection，维护 fresh run_dir 和 existing run record 的 ArtifactSet 路径合同，不读写 artifact 文件或推进状态。"
    - path: coding_orchestration/runners/codex_cli.py
      reason: "Codex CLI sandbox、resume、report 输出和高权限 flag。"
    - path: coding_orchestration/install.py
      reason: "本机 Hermes 安装、卸载和 preflight 检查逻辑。"
    - path: coding_orchestration/report_contract.py
      reason: "结构化 runner report 质量门。"
    - path: coding_orchestration/state_machine.py
      reason: "公共任务状态转换 contract。"

conventions:
  sources:
    - path: AGENTS.md
      kind: navigation
    - path: README.md
      kind: product_and_runtime_overview
    - path: PLUGIN_USAGE.md
      kind: usage
    - path: PLUGIN_PREREQUISITES.md
      kind: preflight_and_environment
    - path: docs/conventions.md
      kind: canonical_conventions
  command_prefix: rtk
  validation_gates:
    - name: full_unittest
      command_hint: "rtk proxy python3 -m unittest discover -s tests -v"
    - name: single_unittest_file
      command_hint: "rtk proxy python3 -m unittest tests.test_install -v"
    - name: install_preflight
      command_hint: "rtk python3 scripts/install_symlink.py --hermes-home ~/.hermes"
    - name: uninstall_dry_run
      command_hint: "rtk python3 scripts/uninstall_legacy.py --hermes-home ~/.hermes"
    - name: hermes_plugin_status
      command_hint: "rtk hermes plugins list"
    - name: hermes_gateway_status
      command_hint: "rtk hermes gateway status"
  test_framework:
    type: unittest
    test_dir: tests/
    primary_command: "rtk proxy python3 -m unittest discover -s tests -v"
  release_gates:
    - "插件更新后必须重启 Hermes Gateway。"
    - "merge-test 和发布需要人工触发。"
    - "plan-only 不应修改项目文件。"

component_contract:
  sources:
    - path: docs/component-contract.md
      kind: canonical_component_contract
    - path: coding_orchestration/__init__.py
      kind: plugin_entrypoint
    - path: coding_orchestration/orchestrator.py
      kind: orchestration_core
    - path: coding_orchestration/runners/
      kind: runner_adapters
    - path: coding_orchestration/source_resolver.py
      kind: source_adapter
    - path: coding_orchestration/report_contract.py
      kind: report_gate
  systems:
    - name: plugin_registration
      path: coding_orchestration/__init__.py
      preferred: true
    - name: orchestration
      path: coding_orchestration/orchestrator.py
      preferred: true
    - name: run_orchestration_helper
      path: coding_orchestration/run_orchestration_service.py
      preferred: true
    - name: run_failure_report_projection
      path: coding_orchestration/run_failure_report_projection.py
      preferred: true
    - name: run_report_refinement_projection
      path: coding_orchestration/run_report_refinement_projection.py
      preferred: true
    - name: run_start_selection_projection
      path: coding_orchestration/run_start_selection_projection.py
      preferred: true
    - name: run_session_projection
      path: coding_orchestration/run_session_projection.py
      preferred: true
    - name: run_prompt_projection
      path: coding_orchestration/run_prompt_projection.py
      preferred: true
    - name: run_context_artifact_service
      path: coding_orchestration/run_context_artifact_service.py
      preferred: true
    - name: run_start_artifact_service
      path: coding_orchestration/run_start_artifact_service.py
      preferred: true
    - name: run_artifact_paths
      path: coding_orchestration/run_artifact_paths.py
      preferred: true
    - name: run_ledger_projection
      path: coding_orchestration/run_ledger_projection.py
      preferred: true
    - name: run_manifest_service
      path: coding_orchestration/run_manifest_service.py
      preferred: true
    - name: runner_router
      path: coding_orchestration/runner_router.py
      preferred: true
    - name: source_resolution
      path: coding_orchestration/source_resolver.py
      preferred: true
    - name: task_ledger
      path: coding_orchestration/ledger.py
      preferred: true
    - name: report_contract
      path: coding_orchestration/report_contract.py
      preferred: true
  preferred_abstractions:
    - name: CodingOrchestrator
      path: coding_orchestration/orchestrator.py
      use_instead_of:
        - "在外部直接改 Task Ledger 状态。"
        - "绕过 command/task flow 手动推进 phase。"
    - name: TaskLedger
      path: coding_orchestration/ledger.py
      use_instead_of:
        - "手写 SQLite SQL 更新任务 JSON 字段。"
    - name: TaskStateMachine
      path: coding_orchestration/state_machine.py
      use_instead_of:
        - "自行拼接非法状态转换。"
    - name: run_orchestration_service
      path: coding_orchestration/run_orchestration_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 observed run report、stale completion 观测、execution policy decision 读取、run-level diff guard violations 组合、verification limitations fallback projection、completion report payload、agent run record、reconciled agent run record、reconcile result payload、existing run mode/changed files 规则、merge-test run record、project writeback payload、start_run result payload 或 run completion 投影。"
    - name: run_session_projection
      path: coding_orchestration/run_session_projection.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增 plan report session fields 白名单、plan report session update、run start base/workspace session update、active run session update、runner session update 或 completion session update 纯 payload。"
    - name: run_prompt_projection
      path: coding_orchestration/run_prompt_projection.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增首次/增量 prompt 构造选择、prompt builder 参数拼装或 prompt 分支规则。"
    - name: run_context_artifact_service
      path: coding_orchestration/run_context_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 wiki context、confirmed plan / implementation context、assembled context、run instructions、execution policy 或 context index 文件写入逻辑。"
    - name: run_start_artifact_service
      path: coding_orchestration/run_start_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 report.schema.json、input-prompt.md 或 run-manifest.json 启动 artifact 文件写入逻辑。"
    - name: run_manifest_artifact_service
      path: coding_orchestration/run_manifest_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 run-manifest.json artifact 写回逻辑。"
    - name: run_stderr_artifact_service
      path: coding_orchestration/run_stderr_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 stderr.log artifact 写回逻辑。"
    - name: run_report_artifact_service
      path: coding_orchestration/run_report_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 report.json artifact 读取、summary excerpt 或写回逻辑。"
    - name: run_summary_artifact_service
      path: coding_orchestration/run_summary_artifact_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 summary.md artifact 读取或写回逻辑。"
    - name: run_ledger_projection
      path: coding_orchestration/run_ledger_projection.py
      use_instead_of:
        - "在 orchestrator 中继续新增 artifact、agent_run 或 merge-test record 写回 payload 聚合逻辑。"
    - name: run_summary_projection
      path: coding_orchestration/run_summary_projection.py
      use_instead_of:
        - "在 orchestrator 中继续新增 completed run 或 active run reconcile 的 run summary writer payload 聚合逻辑。"
    - name: run_artifact_paths
      path: coding_orchestration/run_artifact_paths.py
      use_instead_of:
        - "在 orchestrator 中继续新增 fresh run_dir 或 existing run record 的 ArtifactSet 路径 fallback 逻辑。"
    - name: run_start_selection_projection
      path: coding_orchestration/run_start_selection_projection.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增 run context source、checkpoint selection、QA evidence observation、source branch recording、project path requirement、workspace selection 或 manifest checkpoint preparation selection 纯规则。"
    - name: run_failure_report_projection
      path: coding_orchestration/run_failure_report_projection.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增 runner/checkpoint failure report payload 拼装。"
    - name: run_report_refinement_projection
      path: coding_orchestration/run_report_refinement_projection.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增 diff guard / implementation commit missing blocked report、run report refinement projection 或 implementation dirty-check 信号拼装。"
    - name: run_background_orchestration
      path: coding_orchestration/run_background_orchestration.py
      use_instead_of:
        - "在 orchestrator 或 run_orchestration_service 中继续新增后台 run 等待、后台失败收敛或 merge-test human_required pending action 映射。"
    - name: run_manifest_service
      path: coding_orchestration/run_manifest_service.py
      use_instead_of:
        - "在 orchestrator 中继续新增 run manifest 基础字段、启动期 manifest update projection、session metadata 字段投影、Codex attach/resume 展示命令或权限 profile 规则。"
    - name: RunnerRouter
      path: coding_orchestration/runner_router.py
      use_instead_of:
        - "按字符串直接实例化 runner。"
    - name: CodexCliRunner
      path: coding_orchestration/runners/codex_cli.py
      use_instead_of:
        - "在 orchestrator 中手写 Codex CLI 参数。"
    - name: SourceResolver
      path: coding_orchestration/source_resolver.py
      use_instead_of:
        - "直接猜测飞书/Meegle 来源正文。"
    - name: validate_codex_semantic_report
      path: coding_orchestration/report_contract.py
      use_instead_of:
        - "不校验 report.json 就推进任务。"

agent_context:
  canonical_agent_contracts:
    - path: AGENTS.md
      kind: repository_navigation
    - path: contracts/project-context.yaml
      kind: project_context
    - path: coding_orchestration/skills/hermes-coding-operator/SKILL.md
      kind: hermes_registered_operator_skill
      optional: true
  multi_agent_readiness:
    ownership_boundaries_clear: true
    guarded_paths_defined: true
    bootstrap_layer_complete: true
  non_goals:
    - "不在 project-context 中定义 topology 推荐。"
    - "不在 project-context 中定义 agent 数量。"
    - "不在 project-context 中定义 execution order。"
    - "不生成 .codex/agents/* 配置层。"

uncertainty:
  missing_information:
    - "仓库没有 pyproject.toml、requirements.txt 或 lockfile，依赖声明不完整。"
    - "Hermes CLI、Codex CLI、lark-cli 和飞书权限状态需要在本机运行时验证。"
  inferred_but_unverified:
    - "测试框架从 README 和测试文件推断为标准库 unittest。"
    - "当前无需 app-deep refresh，因为未发现 apps/*、独立 package.json/Vite app 或主前端入口链。"
