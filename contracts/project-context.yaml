      preferred: true
    - name: run_project_writeback_service
      path: coding_orchestration/run_project_writeback_service.py
      preferred: true
    - name: merge_test_readiness_service
      path: coding_orchestration/merge_test_readiness_service.py
      preferred: true
    - name: project_profile_catalog
